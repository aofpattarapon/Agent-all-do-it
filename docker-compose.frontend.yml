
# Frontend development configuration
# Usage: docker-compose -f docker-compose.frontend.yml up -d
#
# Note: Backend must be running first (docker-compose up -d)
# Frontend joins the backend Docker network and talks to the app container
# directly so it always sees the same API surface as localhost:8100.

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_RAG_ENABLED=false
        - NEXT_PUBLIC_WS_URL=ws://localhost:8100
    container_name: pixel_dream_agent_frontend
    ports:
      - "${FRONTEND_PORT:-3100}:3000"
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://pixel_dream_agent_backend:8000
      - BACKEND_WS_URL=ws://pixel_dream_agent_backend:8000
    networks:
      - pixel_dream_agent_backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

networks:
  pixel_dream_agent_backend:
    external: true

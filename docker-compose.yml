
# Backend development configuration
# Usage: docker-compose up -d

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pixel_dream_agent_backend:dev
    container_name: pixel_dream_agent_backend
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic
      - ./backend/cli:/app/cli:ro
      - media_data:/app/media
      # Mount host CLI binaries (claude, codex) so they work without API keys
      - ${HOME}/.local/bin:/host-local-bin:ro
      # Mount auth/config dirs so CLI tools can read their stored credentials
      - ${HOME}/.codex:/home/appuser/.codex
      - ${HOME}/.config/claude:/home/appuser/.config/claude
      - ${HOME}/.config/kimi:/home/appuser/.config/kimi
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=true
      - ENVIRONMENT=local
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # /app/.venv/bin first so uvicorn/python work; then host binaries and cli scripts
      - PATH=/app/.venv/bin:/host-local-bin:/app/cli:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # CLI bridge: Docker calls host Mac to run claude/codex/kimi binaries
      - CLI_BRIDGE_URL=http://host.docker.internal:7777
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: pixel_dream_agent_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-pixel_dream_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port exposed only for local development - remove in production
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pixel_dream_agent_redis
    # Port exposed only for local development - remove in production
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery_worker:
    image: pixel_dream_agent_backend:dev
    pull_policy: never
    container_name: pixel_dream_agent_celery_worker
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/cli:/app/cli:ro
      - media_data:/app/media
      - ${HOME}/.local/bin:/host-local-bin:ro
      - ${HOME}/.codex:/home/appuser/.codex
      - ${HOME}/.config/claude:/home/appuser/.config/claude
      - ${HOME}/.config/kimi:/home/appuser/.config/kimi
    command: celery -A app.worker.celery_app worker --loglevel=debug
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=true
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PATH=/app/.venv/bin:/host-local-bin:/app/cli:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - CLI_BRIDGE_URL=http://host.docker.internal:7777
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping --timeout 5 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 20s
      retries: 3
    networks:
      - backend
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    image: pixel_dream_agent_backend:dev
    pull_policy: never
    container_name: pixel_dream_agent_celery_beat
    volumes:
      - ./backend/app:/app/app:ro
    command: celery -A app.worker.celery_app beat --loglevel=debug
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=true
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - backend
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    image: pixel_dream_agent_backend:dev
    pull_policy: never
    container_name: pixel_dream_agent_flower
    command: celery -A app.worker.celery_app flower --port=5555
    ports:
      - "${FLOWER_PORT:-5556}:5555"
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=true
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:5555/')\" > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - backend
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  media_data:
  postgres_data:
  redis_data:


# Development configuration (alias for docker-compose.yml)
# Usage: docker-compose -f docker-compose.dev.yml up -d
#
# This file is identical to docker-compose.yml for explicit naming preference.
# Use docker-compose.yml for default development.

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pixel_dream_agent_backend:dev
    container_name: pixel_dream_agent_backend
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/cli:/app/cli:ro
      - media_data:/app/media
      # Mount Claude CLI + auth so agents can use subscription (no extra API billing)
      - /Users/socket9companylimited/.local/bin/claude:/usr/local/bin/claude:ro
      - /Users/socket9companylimited/.claude:/root/.claude:ro
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=true
      - ENVIRONMENT=local
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: pixel_dream_agent_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-pixel_dream_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pixel_dream_agent_redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  celery_worker:
    image: pixel_dream_agent_backend:dev
    pull_policy: never
    container_name: pixel_dream_agent_celery_worker
    profiles: ["docker-workers"]  # disabled by default — run worker natively via run-workers.sh
    volumes:
      - ./backend/app:/app/app:ro
      - media_data:/app/media
    command: celery -A app.worker.celery_app worker --loglevel=debug
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=true
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - backend
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    image: pixel_dream_agent_backend:dev
    pull_policy: never
    container_name: pixel_dream_agent_celery_beat
    profiles: ["docker-workers"]  # disabled by default — run beat natively via run-workers.sh
    volumes:
      - ./backend/app:/app/app:ro
    command: celery -A app.worker.celery_app beat --loglevel=debug
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=true
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - backend
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    image: pixel_dream_agent_backend:dev
    pull_policy: never
    container_name: pixel_dream_agent_flower
    command: celery -A app.worker.celery_app flower --port=5555
    ports:
      - "${FLOWER_PORT:-5556}:5555"
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=true
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - backend
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  media_data:
  postgres_data:
  redis_data:
